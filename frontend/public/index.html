<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f1117" />

    <!-- ── Primary SEO ── -->
    <title>YumBowl — Personalized Indian Diet Planner</title>
    <meta name="description" content="Get a science-backed, personalized 7-day Indian meal plan based on your body stats, goals, allergies and monthly budget. Free to start. No downloads needed." />

    <meta name="author" content="YumBowl" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://yumbowl.vercel.app/" />

    <!-- ── Open Graph (Facebook, LinkedIn, WhatsApp) ── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://yumbowl.vercel.app/" />
    <meta property="og:title"       content="YumBowl — Personalized Indian Diet Planner" />
    <meta property="og:description" content="Science-backed 7-day Indian meal plans tailored to your body, goal and budget. Dal, paneer, chicken — food you'll actually eat." />
    <meta property="og:image"       content="https://yumbowl.vercel.app/og-image.png" />
    <meta property="og:locale"      content="en_IN" />
    <meta property="og:site_name"   content="YumBowl" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="YumBowl — Personalized Indian Diet Planner" />
    <meta name="twitter:description" content="Science-backed 7-day Indian meal plans tailored to your body, goal and budget." />
    <meta name="twitter:image"       content="https://yumbowl.vercel.app/og-image.png" />

    <!-- ── JSON-LD structured data ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "name": "YumBowl",
      "url": "https://yumbowl.vercel.app",
      "description": "Personalized Indian diet planner with 7-day meal plans based on body stats, goals and budget.",
      "applicationCategory": "HealthApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "INR"
      }
